<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브레인시티 비스타동원</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. 루빈 바 애니메이션 */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }

        /* 2. 스크롤 애니메이션 (Fade-in Up) */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.7s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

    <div class="bg-[#800020] text-white py-3 overflow-hidden whitespace-nowrap">
        <div class="animate-marquee">
            <span class="mx-8 font-bold text-sm md:text-base">삼성전자 P5 2028년 가동 예정</span>
            <span class="mx-8 font-bold text-sm md:text-base">KAIST 평택캠퍼스 2029년 개교 확정</span>
            <span class="mx-8 font-bold text-sm md:text-base text-yellow-300">★관심고객 등록 시 미공개 정보 및 분양 일정 우선 안내★</span>
            <span class="mx-8 font-bold text-sm md:text-base">삼성전자 P5 2028년 가동 예정</span>
            <span class="mx-8 font-bold text-sm md:text-base">KAIST 평택캠퍼스 2029년 개교 확정</span>
            <span class="mx-8 font-bold text-sm md:text-base text-yellow-300">★관심고객 등록 시 미공개 정보 및 분양 일정 우선 안내★</span>
        </div>
    </div>

    <header class="sticky top-0 bg-white/95 backdrop-blur-sm shadow-sm z-50 px-5 py-4 flex justify-between items-center border-b border-slate-100">
        <img src="logo-vista.png" alt="로고" class="h-7 md:h-9">
        <a href="tel:1688-4609" class="flex items-center gap-2 text-[#800020] font-extrabold text-lg md:text-xl">
            <span class="text-[10px] md:text-xs border border-[#800020] px-1.5 py-0.5 rounded">대표번호</span>
            1688-4609
        </a>
    </header>

    <section>
        <img src="main-vision.jpg" alt="조감도" class="w-full h-auto">
    </section>

    <section class="grid grid-cols-2 gap-3 p-4 bg-slate-50">
        <div class="reveal bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center" onclick="location.href='#env'">
            <span class="text-3xl">📍</span>
            <div class="font-bold mt-2">입지환경</div>
            <div class="text-[10px] text-slate-500 mt-1">삼성 & KAIST 바로 앞</div>
        </div>
        <div class="reveal bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center" onclick="location.href='#complex'">
            <span class="text-3xl">🌳</span>
            <div class="font-bold mt-2">단지안내</div>
            <div class="text-[10px] text-slate-500 mt-1">에버랜드 협업 조경</div>
        </div>
        <div class="reveal bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center" onclick="location.href='#plan'">
            <span class="text-3xl">📐</span>
            <div class="font-bold mt-2">평면정보</div>
            <div class="text-[10px] text-slate-500 mt-1">4Bay 판상형 특화</div>
        </div>
        <div class="reveal bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center" onclick="location.href='#interest'">
            <span class="text-3xl">🎁</span>
            <div class="font-bold mt-2">관심고객</div>
            <div class="text-[10px] text-slate-500 mt-1">등록 시 특별 혜택</div>
        </div>
    </section>

    <footer class="bg-[#000080] h-28 w-full mt-20"></footer>

    <script>
        // 스크롤 감지 애니메이션 (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
