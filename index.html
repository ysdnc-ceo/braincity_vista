<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동원 비스타 랜딩페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .floating-btn { transition: transform 0.2s; }
        .floating-btn:active { transform: scale(0.9); }
        @keyframes subtle-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .pulse-btn { animation: subtle-pulse 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            const phoneNumber = "010-0000-0000"; 
            const kakaoLink = "#"; 

            return (
                <div className="max-w-2xl mx-auto bg-white min-h-screen shadow-lg pb-40">
                    {/* 상단 헤더 */}
                    <header className="bg-blue-900 text-white p-6 text-center">
                        <h1 className="text-2xl font-bold text-amber-400 tracking-tight">동원 비스타</h1>
                        <p className="text-sm opacity-80 mt-1">브레인시티의 압도적 랜드마크</p>
                    </header>
                    
                    <div className="p-6">
                        {/* 홍보 배너 */}
                        <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-8 text-center">
                            <p className="text-amber-800 font-bold">📢 선착순 동호지정 계약 중!</p>
                        </div>

                        {/* 메인 콘텐츠 (이미지 영역) */}
                        <section className="space-y-6 mb-12">
                            <div className="bg-gray-100 aspect-[16/9] flex items-center justify-center rounded-2xl text-gray-400 border-2 border-dashed border-gray-200">
                                <span className="text-sm">[ 조감도 이미지 영역 ]</span>
                            </div>
                            
                            <div className="bg-slate-50 p-6 rounded-2xl">
                                <h2 className="text-xl font-bold text-blue-900 mb-4 border-b pb-2">사업안내</h2>
                                <div className="space-y-4 text-sm text-gray-700">
                                    <p className="flex justify-between border-b border-gray-100 pb-2"><b>위치</b> <span>평택 브레인시티 내</span></p>
                                    <p className="flex justify-between border-b border-gray-100 pb-2"><b>규모</b> <span>지하 2층 ~ 지상 35층</span></p>
                                    <p className="flex justify-between pb-1"><b>세대수</b> <span>총 1,XXX 세대 대단지</span></p>
                                </div>
                            </div>
                        </section>

                        <p className="text-[10px] text-gray-400 text-center leading-relaxed mb-20">
                            ※ 본 페이지는 소비자 이해를 돕기 위한 홍보물입니다.
                        </p>
                    </div>

                    {/* 📱 1. 우측 사이드 플로팅 버튼 (전화/카톡) */}
                    <div className="fixed bottom-24 right-6 flex flex-col gap-3 z-40">
                        <a href={kakaoLink} className="floating-btn w-14 h-14 bg-[#FEE500] rounded-full shadow-lg flex flex-col items-center justify-center border border-yellow-400">
                            <span className="text-lg">💬</span>
                            <span className="text-[9px] font-bold text-[#3C1E1E]">카톡상담</span>
                        </a>
                        <a href={`tel:${phoneNumber}`} className="floating-btn w-14 h-14 bg-blue-600 rounded-full shadow-lg flex flex-col items-center justify-center border border-blue-700 text-white">
                            <span className="text-lg">📞</span>
                            <span className="text-[9px] font-bold">전화연결</span>
                        </a>
                    </div>

                    {/* 🚀 2. 하단 전체 가로 바 (관심고객등록) */}
                    <div className="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 p-3 z-50">
                        <div className="max-w-2xl mx-auto">
                            <button className="pulse-btn w-full bg-gradient-to-r from-amber-400 to-amber-500 text-blue-900 py-4 rounded-xl font-extrabold text-xl shadow-lg active:scale-95 transition-all">
                                ✨ 관심고객 등록하고 혜택받기
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
