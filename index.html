<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브레인시티 비스타동원</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; animation: marquee 30s linear infinite; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

    <div class="bg-[#800020] text-white py-3 overflow-hidden whitespace-nowrap">
        <div class="animate-marquee">
            <span class="mx-10 font-bold text-sm md:text-base">삼성전자 P5 2028년 가동 예정</span>
            <span class="mx-10 font-bold text-sm md:text-base">KAIST 평택캠퍼스 2029년 개교 확정</span>
            <span class="mx-10 font-bold text-sm md:text-base text-yellow-300">★관심고객 등록 시 미공개 정보 및 분양 일정 우선 안내★</span>
            <span class="mx-10 font-bold text-sm md:text-base">삼성전자 P5 2028년 가동 예정</span>
            <span class="mx-10 font-bold text-sm md:text-base">KAIST 평택캠퍼스 2029년 개교 확정</span>
        </div>
    </div>

    <header class="sticky top-0 bg-white/95 backdrop-blur-sm shadow-sm z-50 px-5 py-4 flex justify-between items-center border-b">
        <img src="logo-vista.png" alt="비스타동원 로고" class="h-8 md:h-10">
        <a href="tel:1688-4609" class="flex items-center gap-2 text-[#800020] font-black text-lg md:text-xl">
            <span class="text-[10px] border border-[#800020] px-1.5 py-0.5 rounded leading-none">대표번호</span>
            1688-4609
        </a>
    </header>

    <section class="w-full">
        <img src="main-vision.jpg" alt="메인 조감도" class="w-full h-auto">
    </section>

    <section class="p-4 bg-slate-50 sticky top-[72px] z-40 shadow-sm">
        <div class="flex gap-2 w-full">
            <button onclick="document.getElementById('env').scrollIntoView()" class="flex-1 h-14 bg-white border border-slate-200 rounded-lg shadow-sm font-bold text-xs text-slate-700 active:-translate-y-1 transition-all">입지환경</button>
            <button onclick="document.getElementById('complex').scrollIntoView()" class="flex-1 h-14 bg-white border border-slate-200 rounded-lg shadow-sm font-bold text-xs text-slate-700 active:-translate-y-1 transition-all">단지안내</button>
            <button onclick="document.getElementById('plan').scrollIntoView()" class="flex-1 h-14 bg-white border border-slate-200 rounded-lg shadow-sm font-bold text-xs text-slate-700 active:-translate-y-1 transition-all">평면정보</button>
            <button onclick="document.getElementById('interest').scrollIntoView()" class="flex-1 h-14 bg-[#800020] text-white rounded-lg shadow-sm font-bold text-xs active:-translate-y-1 transition-all">관심고객</button>
        </div>
    </section>

    <section class="reveal py-10 px-4">
        <img src="premium1.jpg" alt="프리미엄" class="w-full rounded-2xl shadow-lg">
    </section>

    <section id="env" class="reveal py-10 bg-slate-50 px-4">
        <h2 class="text-center text-2xl font-bold mb-6 text-[#800020]">입지환경</h2>
        <div class="relative">
            <img src="map.jpg" alt="입지환경 지도" class="w-full rounded-2xl border-4 border-white shadow-md">
            <div class="absolute top-10 left-10 bg-[#800020] text-white px-3 py-1 rounded-full text-xs font-bold animate-bounce">삼성효과!</div>
        </div>
    </section>

    <section id="complex" class="reveal py-10 px-4">
        <h2 class="text-center text-2xl font-bold mb-6 text-[#800020]">단지안내</h2>
        <img src="danzi.jpg" alt="단지안내" class="w-full rounded-2xl mb-4">
        <div class="grid grid-cols-2 gap-2">
            <img src="1community1.jpg" alt="커뮤니티1" class="rounded-lg shadow-sm">
            <img src="community2.jpg" alt="커뮤니티2" class="rounded-lg shadow-sm">
        </div>
    </section>

    <section class="reveal py-10 bg-slate-50 px-4">
        <img src="system.jpg" alt="시스템" class="w-full rounded-2xl">
    </section>

    <section id="plan" class="reveal py-10 px-4">
        <h2 class="text-center text-2xl font-bold mb-8 text-[#800020]">평면정보</h2>
        
        <div class="mb-12 border-b pb-8">
            <img src="59_type_title.jpg" alt="59타입" class="w-2/3 mx-auto mb-4">
            <div class="grid grid-cols-2 gap-2">
                <img src="59_type1.jpg" alt="59타입 평면1" class="border rounded">
                <img src="59_type2.jpg" alt="59타입 평면2" class="border rounded">
            </div>
        </div>

        <div class="mb-12 border-b pb-8">
            <img src="84A_type_title.jpg" alt="84A타입" class="w-2/3 mx-auto mb-4">
            <div class="grid grid-cols-2 gap-2">
                <img src="84A_type1.jpg" alt="84A타입 평면1" class="border rounded">
                <img src="84A_type2.jpg" alt="84A타입 평면2" class="border rounded">
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-sm italic">84B, 84C 타입 정보는 홍보관에서 확인 가능합니다.</p>
    </section>

    <section class="reveal py-10 bg-slate-50 px-4">
        <div class="flex flex-col gap-4">
            <img src="brand_01.jpg" alt="브랜드1" class="rounded-xl">
            <img src="brand_02.jpg" alt="브랜드2" class="rounded-xl">
        </div>
    </section>

    <section id="interest" class="reveal py-16 px-6 bg-white">
        <div class="max-w-md mx-auto border-2 border-[#800020] p-8 rounded-3xl shadow-xl">
            <h3 class="text-2xl font-black text-center mb-2 text-[#800020]">관심고객 등록</h3>
            <p class="text-center text-sm text-slate-500 mb-8">등록 시 미공개 일정 및 혜택을 우선 안내드립니다.</p>
            <div class="space-y-4">
                <input type="text" placeholder="성함" class="w-full p-4 bg-slate-100 rounded-xl focus:ring-2 focus:ring-[#800020] outline-none">
                <input type="tel" placeholder="연락처 (- 없이)" class="w-full p-4 bg-slate-100 rounded-xl focus:ring-2 focus:ring-[#800020] outline-none">
                <button class="w-full py-5 bg-[#800020] text-white font-bold rounded-xl text-lg shadow-lg active:scale-95 transition-transform">무료 상담 신청하기</button>
            </div>
        </div>
    </section>

    <footer class="bg-[#000080] h-28 w-full"></footer>

    <script>
        // 스크롤 애니메이션 스크립트
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
