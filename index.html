<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동원 비스타 랜딩페이지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const BusinessApp = () => {
            const [content, setContent] = useState("");
            const [showToast, setShowToast] = useState(false);
            const [toastMsg, setToastMsg] = useState("");

            useEffect(() => {
                const savedContent = localStorage.getItem('business_content');
                if (savedContent) {
                    setContent(savedContent);
                    displayToast("이전에 작성하던 내용을 불러왔습니다.");
                }
            }, []);

            const handleInputChange = (e) => {
                const value = e.target.value;
                setContent(value);
                localStorage.setItem('business_content', value);
            };

            const displayToast = (msg) => {
                setToastMsg(msg);
                setShowToast(true);
                setTimeout(() => setShowToast(false), 3000);
            };

            return (
                <div class="min-h-screen flex flex-col items-center justify-center p-4">
                    <main class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
                        <h1 class="text-3xl font-bold text-gray-800 mb-4">🏗️ 동원 비스타</h1>
                        <p class="text-gray-600 mb-6">랜딩페이지 제작 도구</p>
                        
                        <textarea 
                            value={content}
                            onChange={handleInputChange}
                            placeholder="내용을 입력하세요..."
                            class="w-full h-40 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none mb-4"
                        />
                        
                        <div class="text-green-500 text-sm font-medium animate-pulse">
                            ● 실시간 자동 저장 중
                        </div>
                        
                        <p class="mt-4 text-xs text-gray-400">
                            브라우저 캐시를 삭제하기 전까지 데이터는 유지됩니다.
                        </p>
                    </main>

                    {showToast && (
                        <div class="fixed bottom-10 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl transition-all border border-gray-700">
                            <span class="text-sm">{toastMsg}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BusinessApp />);
    </script>
</body>
</html>
<body class="bg-slate-50">
    <div id="root"></div>

        const App = () => (
            <div className="max-w-md mx-auto bg-white min-h-screen shadow-lg">
                <header className="bg-blue-900 text-white p-6 text-center">
                    <h1 className="text-2xl font-bold text-amber-400">동원 비스타</h1>
                    <p className="text-sm opacity-80 mt-1">브레인시티의 압도적 랜드마크</p>
                </header>
                
                <div className="p-6">
                    <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6">
                        <p className="text-amber-800 font-bold">📢 선착순 동호지정 계약 중!</p>
                    </div>

                    <section className="space-y-4 mb-8">
                        <div className="bg-gray-100 h-48 flex items-center justify-center rounded-lg text-gray-400">
                            [ 여기에 조감도 이미지가 들어갑니다 ]
                        </div>
                        <h2 className="text-xl font-bold text-gray-800 underline decoration-blue-500">사업개요</h2>

                            <li>• 위치: 평택 브레인시티 내</li>
                            <li>• 규모: 지하 2층 ~ 지상 35층</li>
                            <li>• 세대수: 총 1,XXX 세대 대단지</li>
                        </ul>
                    </section>

                    <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-blue-200 shadow-lg active:scale-95 transition-transform">
                        📞 모델하우스 전화 연결
                    </button>
                </div>
            </div>
        );
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
