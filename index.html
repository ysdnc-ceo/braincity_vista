<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브레인시티 비스타동원</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 루빈 바 롤링 애니메이션 */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }

        /* 스크롤 시 아래에서 위로 올라오는 효과 */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

    <div class="bg-[#800020] text-white py-3 overflow-hidden whitespace-nowrap">
        <div class="animate-marquee">
            <span class="mx-10 font-bold text-sm md:text-base">삼성전자 P5 2028년 가동 예정</span>
            <span class="mx-10 font-bold text-sm md:text-base">KAIST 평택캠퍼스 2029년 개교 확정</span>
            <span class="mx-10 font-bold text-sm md:text-base text-yellow-300">★관심고객 등록 시 미공개 정보 및 분양 일정 우선 안내★</span>
            <span class="mx-10 font-bold text-sm md:text-base">삼성전자 P5 2028년 가동 예정</span>
            <span class="mx-10 font-bold text-sm md:text-base">KAIST 평택캠퍼스 2029년 개교 확정</span>
            <span class="mx-10 font-bold text-sm md:text-base text-yellow-300">★관심고객 등록 시 미공개 정보 및 분양 일정 우선 안내★</span>
        </div>
    </div>

    <header class="sticky top-0 bg-white shadow-sm z-50 px-5 py-4 flex justify-between items-center">
        <div class="font-black text-2xl text-[#800020]">DW</div> <a href="tel:1688-4609" class="flex items-center gap-2 text-[#800020] font-bold text-lg">
            <span class="text-[10px] border border-[#800020] px-1 rounded">대표번호</span>
            1688-4609
        </a>
    </header>

    <section class="w-full bg-slate-200 aspect-[16/9] flex items-center justify-center overflow-hidden">
        <img src="https://via.placeholder.com/1200x675?text=Main+Image" alt="조감도" class="w-full h-full object-cover">
    </section>

    <section class="p-4 bg-slate-50">
        <div class="flex gap-2 w-full">
            <button onclick="window.scrollTo({top: 800, behavior: 'smooth'})" 
                class="reveal flex-1 h-16 bg-white border border-slate-200 rounded-lg shadow-sm font-bold text-[13px] text-slate-700 transition-all active:-translate-y-1 active:border-[#800020] active:text-[#800020]">
                입지환경
            </button>
            <button onclick="window.scrollTo({top: 1200, behavior: 'smooth'})"
                class="reveal flex-1 h-16 bg-white border border-slate-200 rounded-lg shadow-sm font-bold text-[13px] text-slate-700 transition-all active:-translate-y-1 active:border-[#800020] active:text-[#800020]">
                단지안내
            </button>
            <button onclick="window.scrollTo({top: 1600, behavior: 'smooth'})"
                class="reveal flex-1 h-16 bg-white border border-slate-200 rounded-lg shadow-sm font-bold text-[13px] text-slate-700 transition-all active:-translate-y-1 active:border-[#800020] active:text-[#800020]">
                평면정보
            </button>
            <button onclick="window.scrollTo({top: 2000, behavior: 'smooth'})"
                class="reveal flex-1 h-16 bg-white border border-slate-200 rounded-lg shadow-sm font-bold text-[13px] text-slate-700 transition-all active:-translate-y-1 active:border-[#800020] active:text-[#800020]">
                관심고객
            </button>
        </div>
    </section>

    <footer class="bg-[#000080] h-24 mt-20"></footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
